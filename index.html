<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAT - John's Awesome Tools</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --accent-folder: #bc8cff;
            --neon-orange: #f0883e;
            --success: #3fb950;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--neon-orange);
            margin-bottom: 30px;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--neon-orange);
            letter-spacing: 2px;
        }

        #searchJAT {
            width: 100%;
            padding: 12px 15px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            margin-bottom: 25px;
            outline: none;
            transition: border-color 0.3s;

            /* ADD THIS LINE */
            box-sizing: border-box;
        }

        #searchJAT:focus {
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        .tree-root {
            list-style: none;
            padding: 0;
        }

        details {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        summary {
            padding: 12px;
            cursor: pointer;
            font-weight: bold;
            color: var(--accent-folder);
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        summary:hover {
            background: #21262d;
        }

        summary::-webkit-details-marker {
            display: none;
        }

        .folder-content {
            padding: 10px 0 10px 20px;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            background: var(--bg);
        }

        .tool-link {
            padding: 8px 12px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }

        .tool-link:hover {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            transform: translateX(5px);
        }

        .tool-link::before {
            content: "↪";
            margin-right: 10px;
            color: var(--success);
            font-weight: bold;
        }

        .count-badge {
            background: #30363d;
            color: #8b949e;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .hidden {
            display: none !important;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.8rem;
            color: #484f58;
        }
    </style>
</head>

<body>

    <div class="container">

            <h1>[ JAT_FRAMEWORK ]</h1>
            <div style="font-size: 0.8rem; color: var(--success);">v2.0 STABLE ( hopefully )</div>
        </header>

        <input type="text" id="searchJAT" placeholder="Search JAT library..." onkeyup="searchTools()">

        <div id="tree-container" class="tree-root"></div>

    <footer>
     John's Awesome Tools • Locally Hosted Hacking Portal<br>
     <a href="https://github.com/alreadyClosed/JAT" target="_blank" style="color: var(--accent); text-decoration: none; font-size: 0.75rem; opacity: 0.7;">View Source on GitHub</a>
    </footer>
    </div>

            ["PHYSICAL", "Keygen.co (Key Codes)", "https://keygen.co/"],

            ["RECON", "SpiderFoot (Automation)", "https://www.spiderfoot.net/"],
            ["RECON", "Subfinder (Subdomains)", "https://github.com/projectdiscovery/subfinder"],
            ["RECON", "Amass", "https://github.com/owasp-amass/amass"],
            
        ];

        function buildJAT() {
            const container = document.getElementById('tree-container');
            const categories = {};

            myTools.sort((a, b) => a[0].localeCompare(b[0])); // Sort folders A-Z

            myTools.forEach(([cat, name, url]) => {
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ name, url });
            });

            for (const cat in categories) {
                const details = document.createElement('details');
                const summary = document.createElement('summary');
                summary.innerHTML = `${cat} <span class="count-badge">${categories[cat].length}</span>`;

                const content = document.createElement('div');
                content.className = 'folder-content';

                categories[cat].forEach(tool => {
                    const link = document.createElement('a');
                    link.href = tool.url;
                    link.target = "_blank";
                    link.className = 'tool-link';
                    link.innerText = tool.name;
                    content.appendChild(link);
                });

                details.appendChild(summary);
                details.appendChild(content);
                container.appendChild(details);
            }
        }

        function searchTools() {
            let input = document.getElementById('searchJAT').value.toLowerCase();
            let details = document.getElementsByTagName('details');

            for (let detail of details) {
                let links = detail.getElementsByClassName('tool-link');
                let hasMatch = false;

                for (let link of links) {
                    if (link.innerText.toLowerCase().includes(input)) {
                        link.classList.remove('hidden');
                        hasMatch = true;
                    } else {
                        link.classList.add('hidden');
                    }
                }

                if (hasMatch) {
                    detail.classList.remove('hidden');
                    detail.open = input.length > 0;
                } else {
                    detail.classList.add('hidden');
                }
            }
        }

        buildJAT();
    </script>
