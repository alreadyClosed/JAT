<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.ico">
    <title>JAT - John's Awesome Tools</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --accent: #f0883e;
            --accent-dim: rgba(240, 136, 62, 0.15);
            --success: #3fb950;
            --modal-overlay: rgba(0, 0, 0, 0.85);
        }

        html { overflow-y: scroll; }
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 20px;
            line-height: 1.5;
        }

        .container { max-width: 950px; margin: 0 auto; }

        header {
            border-bottom: 2px solid var(--accent);
            margin-bottom: 30px; padding-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }

        h1 { 
            margin: 0; 
            font-size: 1.8rem; 
            color: var(--accent); 
            letter-spacing: 2px; 
            font-family: 'Consolas', monospace; 
            white-space: nowrap; 
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; letter-spacing: 1px; }
        }

        #searchJAT {
            width: 100%; padding: 12px 15px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 4px; color: white;
            font-size: 1rem; margin-bottom: 25px; outline: none;
            font-family: 'Consolas', monospace;
        }
        #searchJAT:focus { border-color: var(--accent); }

        .category-node {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 4px; margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .category-node.is-open { border-color: var(--accent); }

        .category-header {
            padding: 14px 18px;
            cursor: pointer; display: flex;
            justify-content: space-between; align-items: center;
            background: #1c2128; user-select: none;
            min-height: 54px;
        }
        .category-header:hover { background: #21262d; }

        .header-left {
            font-family: 'Consolas', monospace; text-transform: uppercase; 
            letter-spacing: 1.5px; font-size: 0.95rem; color: var(--accent); font-weight: bold;
        }

        .category-content {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-in-out;
        }
        .category-node.is-open .category-content { grid-template-rows: 1fr; }

        .content-inner { overflow: hidden; }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 10px; padding: 20px; 
            border-top: 1px solid transparent;
            opacity: 0; transition: opacity 0.3s ease-in-out;
        }
        .category-node.is-open .tools-grid { opacity: 1; border-color: var(--border); }

        .tool-link {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent; border-radius: 4px;
            cursor: pointer; font-family: 'Consolas', monospace;
            font-size: 0.85rem; color: var(--text-main);
            transition: all 0.2s ease; display: flex; align-items: center;
            min-height: 42px;
        }
        .tool-link:hover {
            background: var(--accent-dim); border-color: var(--accent);
            transform: translateX(5px); color: white;
        }
        .tool-link::before { content: ">"; color: var(--accent); margin-right: 12px; }

        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(4px); opacity: 0; transition: opacity 0.3s ease;
        }
        #modal-overlay.active { display: flex; opacity: 1; }

        #tool-modal {
            background: var(--card-bg); border: 1px solid var(--accent);
            width: 90%; max-width: 450px; padding: 25px; border-radius: 6px;
            transform: translateY(15px); transition: transform 0.3s ease;
        }
        #modal-overlay.active #tool-modal { transform: translateY(0); }

        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 25px; }

        .btn-launch, .btn-close {
            padding: 10px 18px; border-radius: 4px; text-decoration: none; 
            font-weight: bold; font-family: 'Consolas', monospace; font-size: 0.85rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; border: 1px solid transparent;
        }

        .btn-launch { background: var(--accent); color: var(--bg); }
        .btn-launch:hover { 
            transform: translateY(-2px) scale(1.03);
            background: #ff9d5c; border-color: #0d1117;
            box-shadow: 0 4px 12px rgba(240, 136, 62, 0.3);
        }

        .btn-close { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-close:hover { 
            transform: translateY(-2px) scale(1.03);
            border-color: var(--accent); color: var(--accent);
            background: rgba(240, 136, 62, 0.05);
        }

        .btn-launch:active, .btn-close:active { transform: translateY(0) scale(0.98); }

        .count-badge { background: #0d1117; color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 1rem; font-weight: bold; border: 1px solid var(--border); font-family: 'Consolas', monospace; }
        .folder-arrow { font-size: 0.7rem; color: #484f58; transition: transform 0.3s; margin-left: 12px; display: inline-block; }
        .category-node.is-open .folder-arrow { transform: rotate(90deg); color: var(--accent); }
        
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            color: #484f58;
            border-top: 1px solid var(--border);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

            <p id="modal-desc" style="font-size: 0.95rem; margin: 20px 0; line-height: 1.5;"></p>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeModal()">[ CLOSE ]</button>
                <a id="modal-url" href="#" target="_blank" class="btn-launch">[ OPEN SITE ]</a>

        </div>

        function openModal(name, url, desc) {
            const overlay = document.getElementById('modal-overlay');
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-url').href = url;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
        }

        function buildJAT() {
            const container = document.getElementById('tree-container');
            container.innerHTML = "";
            const categories = {};
            myTools.forEach(([cat, name, url, desc, tags]) => {
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ name, url, desc, tags });
            });
            Object.keys(categories).sort((a,b) => categories[b].length - categories[a].length).forEach(cat => {
                const node = document.createElement('div');
                node.className = 'category-node';
                node.innerHTML = `
                    <div class="category-header" onclick="this.parentElement.classList.toggle('is-open')">
                        <div class="header-left">${cat}</div>
                        <div><span class="count-badge">${categories[cat].length}</span><span class="folder-arrow">▶</span></div>
                    </div>
                    <div class="category-content"><div class="content-inner"><div class="tools-grid"></div></div></div>`;
                const grid = node.querySelector('.tools-grid');
                categories[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(tool => {
                    const btn = document.createElement('div');
                    btn.className = 'tool-link';
                    btn.innerText = tool.name;
                    btn.setAttribute('data-searchable', `${tool.name} ${tool.desc} ${tool.tags}`.toLowerCase());
                    btn.onclick = () => openModal(tool.name, tool.url, tool.desc);
                    grid.appendChild(btn);
                });
                container.appendChild(node);
            });
        }

        function searchTools() {
            let input = document.getElementById('searchJAT').value.toLowerCase();
            let nodes = document.getElementsByClassName('category-node');
            for (let node of nodes) {
                let links = node.getElementsByClassName('tool-link');
                let hasMatch = false;
                for (let link of links) {
                    if (link.getAttribute('data-searchable').includes(input)) {
                        link.classList.remove('hidden');
                        hasMatch = true;
                    } else { link.classList.add('hidden'); }
                }
                if (hasMatch && input.length > 0) {
                    node.classList.remove('hidden'); node.classList.add('is-open');
                } else if (input.length > 0) {
                    node.classList.add('hidden');
                } else {
                    node.classList.remove('hidden'); node.classList.remove('is-open');
                }
            }
        }
        buildJAT();
